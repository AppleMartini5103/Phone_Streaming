<!doctype html>
<html>
<head><meta charset="utf-8"><title>ms clock</title>
<style>
  html,body{margin:0;background:#000;color:#0f0;
    font-family:"DejaVu Sans Mono",monospace;}
  #t{font-size:140px;font-weight:bold;
    display:flex;align-items:center;justify-content:center;
    height:100vh;letter-spacing:4px;}
</style></head>
<body><div id="t">--:--:--.---</div>
<script>
  const el=document.getElementById('t');
  const p=(n,l)=>String(n).padStart(l,'0');
  function tick(){
    const d=new Date();
    el.textContent=p(d.getHours(),2)+':'+p(d.getMinutes(),2)+':'
      +p(d.getSeconds(),2)+'.'+p(d.getMilliseconds(),3);
    requestAnimationFrame(tick);
  }
  tick();
</script></body></html>
